name: NCCL Profiler Plugin Container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  workflow_dispatch:
  workflow_call:
    inputs:
      force_build:
        description: 'When true, always run build (e.g. when called from release workflow)'
        required: false
        type: boolean
        default: false

jobs:
  check-paths:
    name: Check paths
    runs-on: ubuntu-latest
    permissions: read-all
    outputs:
      nccl-profiler-container: ${{ steps.paths.outputs.nccl-profiler-container }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            nccl-profiler-container:
              - 'profiler/**/*.cc'
              - 'profiler/**/*.h'
              - 'profiler/**/*.hpp'
              - 'profiler/**/*.c'
              - 'profiler/**/CMakeLists.txt'
              - 'profiler/Dockerfile'
              - '.github/workflows/nccl-profiler-plugin-container.yml'
              - '.github/trivy.yaml'

  # PRs: builds default vLLM base only
  # Push to main, tags, workflow_dispatch, workflow_call: build both vLLM base (default + cu130).
  build-matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    permissions: read-all
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'matrix={"include":[{"vllm_base_tag":"v0.19.0","tag_suffix":""}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"vllm_base_tag":"v0.19.0","tag_suffix":""},{"vllm_base_tag":"v0.19.0-cu130","tag_suffix":"-cu130"}]}' >> $GITHUB_OUTPUT
          fi

  build-container:
    name: Build and Scan Profiler Container
    needs: [check-paths, build-matrix]
    if: inputs.force_build == true || github.event_name == 'workflow_dispatch' || needs.check-paths.outputs.nccl-profiler-container == 'true'
    runs-on: ubuntu-latest-m
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: profiler
          # Push the image to the registry if the branch is main or a tag is pushed.
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          # Load image to local Docker so Trivy can scan it when not pushing.
          load: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ vars.DOCKERHUB_REPO || 'local' }}/mosaic-vllm:${{ steps.short-sha.outputs.sha }}${{ matrix.tag_suffix }}
            ${{ (github.ref == 'refs/heads/main' && format('{0}/mosaic-vllm:latest{1}', vars.DOCKERHUB_REPO || 'local', matrix.tag_suffix)) || '' }}
            ${{ (startsWith(github.ref, 'refs/tags/') && format('{0}/mosaic-vllm:{1}{2}', vars.DOCKERHUB_REPO || 'local', github.ref_name, matrix.tag_suffix)) || '' }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            VLLM_BASE_TAG=${{ matrix.vllm_base_tag }}
          cache-from: type=gha,scope=mosaic-vllm-${{ matrix.vllm_base_tag }}
          # Only push cache on main to avoid filling GHA cache on PRs/other branches
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=gha,mode=max,scope=mosaic-vllm-{0}', matrix.vllm_base_tag) || '' }}

      - name: Run Trivy vulnerability scanner
        if: (github.event_name != 'pull_request' && github.event_name != 'workflow_dispatch') || !contains(github.event.pull_request.labels.*.name, 'skip-trivy')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKERHUB_REPO || 'local' }}/mosaic-vllm:${{ steps.short-sha.outputs.sha }}${{ matrix.tag_suffix }}
          trivy-config: .github/trivy.yaml
          trivyignores: .github/.trivyignore

  # Always run so branch protection always sees a result, even when
  # build-container was skipped (no relevant file change)
  build-complete:
    name: Build and Scan Profiler Container Complete
    runs-on: ubuntu-latest
    if: always()
    needs: [build-container]
    steps:
      - name: Check build results
        run: |
          result='${{ needs.build-container.result }}'
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "Build result: $result — OK"
            exit 0
          else
            echo "Build result: $result — FAILED"
            exit 1
          fi